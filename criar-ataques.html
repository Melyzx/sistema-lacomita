<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <title>Forja de Ataques - Mestre</title>
	<link rel="icon" type="image/png" href="simbolo.png">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Space+Mono&display=swap');
        :root { --bg-base: #09090b; --panel-bg: #18181b; --text-main: #e4e4e7; --border: 1px solid #27272a; --accent: #ef4444; }
        body { margin: 0; background: var(--bg-base); color: var(--text-main); font-family: 'Inter', sans-serif; padding-top: 60px; }
        /* MENU GLOBAL OMITIDO */
        .container { padding: 30px; max-width: 800px; margin: auto; }
        .panel { background: var(--panel-bg); border: var(--border); border-radius: 8px; padding: 25px; }
        input { width: 100%; background: #000; border: 1px solid #3f3f46; color: #fff; padding: 12px; margin-bottom: 15px; border-radius: 4px; box-sizing: border-box; font-family: inherit; outline: none;}
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .btn-criar { background: var(--accent); color: #fff; border: none; padding: 15px; font-weight: bold; cursor: pointer; border-radius: 4px; font-family: 'Space Mono'; width: 100%; }
        .template-list { margin-top: 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .template-card { background: #111; border: var(--border); padding: 15px; border-radius: 6px; border-left: 4px solid var(--accent); cursor: pointer;}
    </style>
</head>
<body>
  <!-- === SISTEMA DE MENU PADRONIZADO E INTELIGENTE === -->
<!-- === SISTEMA DE MENU PADRONIZADO === -->
<style>
    .btn-hamburguer { position: fixed; top: 15px; left: 20px; z-index: 999; background: #111; border: 1px solid #3f3f46; color: #e4e4e7; padding: 8px 14px; font-size: 1.2rem; cursor: pointer; border-radius: 4px; font-family: 'Space Mono', monospace; transition: 0.2s;}
    .btn-hamburguer:hover { border-color: #ef4444; color: #ef4444; }
    .menu-overlay { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0, 0, 0, 0.7); z-index: 1000; }
    .menu-overlay.ativo { display: block; }
    .menu-drawer { position: fixed; top: 0; left: -350px; width: 300px; height: 100vh; background: #0d0d0f; border-right: 1px solid #27272a; z-index: 1001; padding: 25px; display: flex; flex-direction: column; transition: left 0.3s ease; box-sizing: border-box; font-family: 'Space Mono', monospace;}
    .menu-drawer.ativo { left: 0; }
    .perfil-card { background: #141417; border: 1px solid #27272a; border-radius: 8px; padding: 15px; display: flex; align-items: center; gap: 15px; margin-top: 20px; }
    .perfil-avatar { width: 60px; height: 60px; border-radius: 50%; border: 2px solid #ef4444; overflow: hidden; display: flex; align-items: center; justify-content: center; flex-shrink: 0; background:#000; }
    .perfil-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .menu-links { list-style: none; padding: 0; margin: 30px 0 0 0; display: flex; flex-direction: column; gap: 8px; }
    .menu-links li a { display: flex; align-items: center; padding: 12px; color: #a1a1aa; text-decoration: none; border-radius: 4px; background: #111; font-size: 0.85rem;}
    .menu-links li a:hover { color: #fff; border: 1px solid var(--hp-color); }
</style>

<button class="btn-hamburguer" onclick="document.getElementById('overlay-menu').classList.toggle('ativo'); document.getElementById('drawer-menu').classList.toggle('ativo');">☰</button>
<div class="menu-overlay" id="overlay-menu" onclick="this.classList.remove('ativo'); document.getElementById('drawer-menu').classList.remove('ativo');"></div>
<aside class="menu-drawer" id="drawer-menu">
    <div>
        <div style="font-size: 0.7rem; color: #71717a;">SISTEMA LACOMITA</div>
        <div class="perfil-card">
            <div class="perfil-avatar"><img id="menu-img-personagem" src="" onerror="this.src='simbolo.png'"></div>
            <div>
                <strong id="menu-nome-personagem" style="color: #fff; font-size: 0.9rem;">--</strong><br>
                <span id="menu-cargo-personagem" style="font-size: 0.7rem; color: #ef4444; font-weight: bold;">--</span>
            </div>
        </div>
        <ul class="menu-links" id="nav-links-dinamico"></ul>
    </div>
</aside>

<script>
    function carregarMenuPadrao() {
        const user = JSON.parse(localStorage.getItem('usuarioLacomita'));
        if(!user) return;
        document.getElementById('menu-img-personagem').src = user.foto || 'simbolo.png';
        document.getElementById('menu-nome-personagem').innerText = user.nome;
        document.getElementById('menu-cargo-personagem').innerText = user.papel === 'mestre' ? 'ACESSO SUPREMO' : 'OPERADOR';

        const links = [
            { path: 'agente.html', name: 'Terminal / VTT', roles: ['agente'] },
            { path: 'mestre.html', name: 'Central do Mestre', roles: ['mestre'] },
            { path: 'criar-npc.html', name: 'Criar Entidades (NPCs)', roles: ['mestre'] },
            { path: 'criar-ataques.html', name: 'Forja de Ataques', roles: ['mestre'] },
            { path: 'criar-item.html', name: 'Forja de Armas', roles: ['mestre'] },
            { path: 'anotacoes.html', name: 'Anotações (Diário)', roles: ['agente', 'mestre'] },
            { path: 'editar-conta.html', name: 'Editar Conta', roles: ['agente', 'mestre'] }
        ];

        let html = '';
        let current = window.location.pathname.split('/').pop() || 'agente.html';
        links.forEach(l => {
            if(l.roles.includes(user.papel)) {
                let isAtivo = current === l.path ? 'style="border: 1px solid #3b82f6; color: #fff; background: rgba(59,130,246,0.1);"' : '';
                html += `<li><a href="${l.path}" ${isAtivo}>${l.name}</a></li>`;
            }
        });
        html += `<li><a href="#" onclick="logout()" style="color: #ef4444;">Desconectar / Sair</a></li>`;
        document.getElementById('nav-links-dinamico').innerHTML = html;
    }
    window.addEventListener('DOMContentLoaded', carregarMenuPadrao);
    function logout() { localStorage.removeItem('usuarioLacomita'); window.location.href = 'login.html'; }
</script>
<!-- === FIM DO MENU PADRONIZADO === -->

    <div class="container">
        <div class="panel">
            <h2>⚔️ Forja e Edição de Ataques</h2>
            <input type="hidden" id="atk-id" value="">
            <input type="text" id="atk-nome" placeholder="Nome do Ataque (Ex: Tiro Focado)">
            <div class="grid-2">
                <input type="text" id="atk-dano" placeholder="Fórmula de Dano (Ex: 2d6+2)">
                <input type="number" id="atk-san" placeholder="Custo de SAN (0 se não houver)">
            </div>
            <input type="text" id="atk-efeitos" placeholder="Efeitos Adicionais">
            
            <div style="display:flex; gap:10px;">
                <button class="btn-criar" onclick="gravarAtaque()">GRAVAR</button>
                <button class="btn-criar" style="background:#27272a;" onclick="limpar()">LIMPAR</button>
                <button class="btn-criar" style="background:#7f1d1d;" onclick="apagarAtaque()">APAGAR</button>
            </div>
        </div>
        <div class="template-list" id="lista-templates"></div>
    </div>

    <script>
        const socket = io(); let listaTemplates = [];
        async function carregar() {
            let res = await fetch('/api/templates_ataques'); listaTemplates = await res.json();
            let html = '';
            listaTemplates.forEach(t => { html += `<div class="template-card" onclick="editar(${t.id})"><strong style="color:#fff;">${t.nome}</strong><br><span style="font-size:0.8rem;color:#a1a1aa;">Dano: ${t.dano} | SAN: -${t.custo_san}</span></div>`; });
            document.getElementById('lista-templates').innerHTML = html;
        }

        function editar(id) {
            let t = listaTemplates.find(a => a.id === id);
            document.getElementById('atk-id').value = t.id; document.getElementById('atk-nome').value = t.nome;
            document.getElementById('atk-dano').value = t.dano; document.getElementById('atk-san').value = t.custo_san;
            document.getElementById('atk-efeitos').value = t.efeitos;
            window.scrollTo(0,0);
        }

        function limpar() { document.getElementById('atk-id').value=''; document.getElementById('atk-nome').value=''; document.getElementById('atk-dano').value=''; document.getElementById('atk-san').value=''; document.getElementById('atk-efeitos').value=''; }

        function gravarAtaque() {
            let payload = { nome: document.getElementById('atk-nome').value, dano: document.getElementById('atk-dano').value||'1d6', custo_san: parseInt(document.getElementById('atk-san').value)||0, efeitos: document.getElementById('atk-efeitos').value };
            let id = document.getElementById('atk-id').value; if(id) payload.id = id;
            if(!payload.nome) return alert("Falta o nome.");
            socket.emit('criar_template_ataque', payload); limpar();
        }

        function apagarAtaque() {
            let id = document.getElementById('atk-id').value;
            if(id && confirm("Apagar definitivamente?")) { socket.emit('remover_template_ataque', {id: id}); limpar(); }
        }

        socket.on('templates_ataques_atualizados', carregar); carregar();
    </script>
</body>
</html>
