<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <title>Anotações do Sistema</title>
	<link rel="icon" type="image/png" href="simbolo.png">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Space+Mono:wght@400;700&display=swap');
        :root { --bg-base: #050505; --panel-bg: #111113; --text-main: #e4e4e7; --hp-color: #ef4444; --border: 1px solid #27272a; --accent-gold: #fbbf24;}
        body { margin: 0; background-color: var(--bg-base); color: var(--text-main); font-family: 'Inter', sans-serif; padding-top: 80px; display: flex; justify-content: center;}
        
        .container { width: 100%; max-width: 800px; background: var(--panel-bg); border: var(--border); border-radius: 8px; padding: 30px; box-sizing: border-box; }
        h2 { font-family: 'Space Mono'; margin-top: 0; color: #fff; border-bottom: var(--border); padding-bottom: 15px;}
        select { width: 100%; background: #000; border: 1px solid #3f3f46; color: #fff; padding: 12px; margin-bottom: 20px; border-radius: 4px; font-family: inherit; font-size: 1rem; outline:none;}
        textarea { width: 100%; height: 400px; background: #000; border: 1px solid #3f3f46; color: var(--accent-gold); padding: 15px; border-radius: 4px; font-family: 'Inter'; box-sizing: border-box; resize: vertical; outline: none; font-size: 1rem; line-height: 1.5;}
        .btn-salvar { width: 100%; background: #27272a; color: #fff; border: 1px solid #3f3f46; padding: 15px; font-weight: bold; cursor: pointer; border-radius: 4px; font-family: 'Space Mono'; margin-top: 15px; font-size: 1.1rem;}
        .btn-salvar:hover { background: var(--hp-color); border-color: var(--hp-color); }
    </style>
</head>
<body>
  <!-- === SISTEMA DE MENU PADRONIZADO === -->
<style>
    .btn-hamburguer { position: fixed; top: 15px; left: 20px; z-index: 999; background: #111; border: 1px solid #3f3f46; color: #e4e4e7; padding: 8px 14px; font-size: 1.2rem; cursor: pointer; border-radius: 4px; font-family: 'Space Mono', monospace; transition: 0.2s;}
    .btn-hamburguer:hover { border-color: #ef4444; color: #ef4444; }
    .menu-overlay { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0, 0, 0, 0.7); z-index: 1000; }
    .menu-overlay.ativo { display: block; }
    .menu-drawer { position: fixed; top: 0; left: -350px; width: 300px; height: 100vh; background: #0d0d0f; border-right: 1px solid #27272a; z-index: 1001; padding: 25px; display: flex; flex-direction: column; transition: left 0.3s ease; box-sizing: border-box; font-family: 'Space Mono', monospace;}
    .menu-drawer.ativo { left: 0; }
    .perfil-card { background: #141417; border: 1px solid #27272a; border-radius: 8px; padding: 15px; display: flex; align-items: center; gap: 15px; margin-top: 20px; }
    .perfil-avatar { width: 60px; height: 60px; border-radius: 50%; border: 2px solid #ef4444; overflow: hidden; display: flex; align-items: center; justify-content: center; flex-shrink: 0; background:#000; }
    .perfil-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .menu-links { list-style: none; padding: 0; margin: 30px 0 0 0; display: flex; flex-direction: column; gap: 8px; }
    .menu-links li a { display: flex; align-items: center; padding: 12px; color: #a1a1aa; text-decoration: none; border-radius: 4px; background: #111; font-size: 0.85rem;}
    .menu-links li a:hover { color: #fff; border: 1px solid var(--hp-color); }
</style>

<button class="btn-hamburguer" onclick="document.getElementById('overlay-menu').classList.toggle('ativo'); document.getElementById('drawer-menu').classList.toggle('ativo');">☰</button>
<div class="menu-overlay" id="overlay-menu" onclick="this.classList.remove('ativo'); document.getElementById('drawer-menu').classList.remove('ativo');"></div>
<aside class="menu-drawer" id="drawer-menu">
    <div>
        <div style="font-size: 0.7rem; color: #71717a;">SISTEMA LACOMITA</div>
        <div class="perfil-card">
            <div class="perfil-avatar"><img id="menu-img-personagem" src="" onerror="this.src='simbolo.png'"></div>
            <div>
                <strong id="menu-nome-personagem" style="color: #fff; font-size: 0.9rem;">--</strong><br>
                <span id="menu-cargo-personagem" style="font-size: 0.7rem; color: #ef4444; font-weight: bold;">--</span>
            </div>
        </div>
        <ul class="menu-links" id="nav-links-dinamico"></ul>
    </div>
</aside>

<script>
    function carregarMenuPadrao() {
        const user = JSON.parse(localStorage.getItem('usuarioLacomita'));
        if(!user) return;
        document.getElementById('menu-img-personagem').src = user.foto || 'simbolo.png';
        document.getElementById('menu-nome-personagem').innerText = user.nome;
        document.getElementById('menu-cargo-personagem').innerText = user.papel === 'mestre' ? 'ACESSO SUPREMO' : 'OPERADOR';

        const links = [
            { path: 'agente.html', name: 'Terminal / VTT', roles: ['agente'] },
            { path: 'mestre.html', name: 'Central do Mestre', roles: ['mestre'] },
            { path: 'criar-npc.html', name: 'Criar Entidades (NPCs)', roles: ['mestre'] },
            { path: 'criar-ataques.html', name: 'Forja de Ataques', roles: ['mestre'] },
            { path: 'criar-item.html', name: 'Forja de Armas', roles: ['mestre'] },
            { path: 'anotacoes.html', name: 'Anotações (Diário)', roles: ['agente', 'mestre'] },
            { path: 'editar-conta.html', name: 'Editar Conta', roles: ['agente', 'mestre'] }
        ];

        let html = '';
        let current = window.location.pathname.split('/').pop() || 'agente.html';
        links.forEach(l => {
            if(l.roles.includes(user.papel)) {
                let isAtivo = current === l.path ? 'style="border: 1px solid #3b82f6; color: #fff; background: rgba(59,130,246,0.1);"' : '';
                html += `<li><a href="${l.path}" ${isAtivo}>${l.name}</a></li>`;
            }
        });
        html += `<li><a href="#" onclick="logout()" style="color: #ef4444;">Desconectar / Sair</a></li>`;
        document.getElementById('nav-links-dinamico').innerHTML = html;
    }
    window.addEventListener('DOMContentLoaded', carregarMenuPadrao);
    function logout() { localStorage.removeItem('usuarioLacomita'); window.location.href = 'login.html'; }
</script>
<!-- === FIM DO MENU PADRONIZADO === -->

    <div class="container">
        <h2>📝 Registos e Anotações Privadas</h2>
        <select id="sel-agente" style="display: none;" onchange="carregarNotaDoServidor(this.value)">
            <option value="mestre">As Minhas Anotações (Mestre)</option>
        </select>
        <textarea id="texto-anotacao" placeholder="Escreve aqui..."></textarea>
        <button class="btn-salvar" onclick="salvarNotaNoServidor()">GUARDAR REGISTOS</button>
    </div>

    <script>
        const socket = io();
        let userLocal = JSON.parse(localStorage.getItem('usuarioLacomita'));
        if(!userLocal) window.location.href = 'login.html';

        if(userLocal.papel === 'mestre') {
            document.getElementById('sel-agente').style.display = 'block';
            carregarOpcoesMestre();
        } else {
            carregarNotaDoServidor(userLocal.login);
        }

        async function carregarOpcoesMestre() {
            let res = await fetch('/api/agentes');
            let agentes = await res.json();
            let opt = `<option value="mestre">As Minhas Anotações (Mestre)</option>`;
            agentes.forEach(a => opt += `<option value="${a.login}">Diário: ${a.nome} (${a.login})</option>`);
            document.getElementById('sel-agente').innerHTML = opt;
            carregarNotaDoServidor('mestre');
        }

        async function carregarNotaDoServidor(login) {
            let res = await fetch(`/api/usuario/${login}`);
            let data = await res.json();
            document.getElementById('texto-anotacao').value = data.anotacoes || '';
        }

        function salvarNotaNoServidor() {
            let alvo = userLocal.papel === 'mestre' ? document.getElementById('sel-agente').value : userLocal.login;
            let texto = document.getElementById('texto-anotacao').value;
            socket.emit('atualizar_status', { login: alvo, tipo: 'anotacoes', valor: texto });
            alert("Anotações Sincronizadas na Base de Dados!");
        }
    </script>
</body>
</html>
